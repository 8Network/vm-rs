name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint & Format ─────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy (lib)
        run: cargo clippy --lib -- -D warnings
      - name: Clippy (tests — allow unwrap)
        run: cargo clippy --tests -- -D warnings -A clippy::unwrap_used

  # ── Unit tests (all platforms) ──────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Build
        run: cargo build --target ${{ matrix.target }}

      - name: Unit tests
        run: cargo test --lib --target ${{ matrix.target }}

      - name: Doc tests
        run: cargo test --doc --target ${{ matrix.target }}

  # ── Integration tests (no VM, both platforms) ──────────────────────
  integration:
    name: Integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-integration

      # VmManager mock driver tests (no hypervisor needed)
      - name: VmManager orchestration tests
        run: cargo test --test vm_manager --target ${{ matrix.target }}

      # Disk clone tests
      - name: Disk clone tests
        run: cargo test --test disk_clone --target ${{ matrix.target }}

      # Seed ISO tests (requires hdiutil on macOS, genisoimage on Linux)
      - name: Install genisoimage (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y genisoimage
      - name: Seed ISO tests
        run: cargo test --test seed_iso --target ${{ matrix.target }}

      # Network switch tests (socketpairs, works everywhere)
      - name: Network switch tests
        run: cargo test --test network_switch --target ${{ matrix.target }}

  # ── OCI registry tests (requires internet) ─────────────────────────
  oci:
    name: OCI Pull
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: oci
      - name: OCI registry pull tests
        run: cargo test --test oci_pull
        timeout-minutes: 5

  # ── VM lifecycle tests (Linux — KVM available on GitHub runners) ──
  vm-linux:
    name: VM Lifecycle (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: vm-linux

      - name: Check KVM availability
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "::warning::KVM not available — skipping VM tests"
            echo "KVM_AVAILABLE=false" >> $GITHUB_ENV
          else
            sudo chmod 666 /dev/kvm
            echo "KVM_AVAILABLE=true" >> $GITHUB_ENV
          fi

      - name: Install Cloud Hypervisor
        if: env.KVM_AVAILABLE == 'true'
        run: |
          CH_VERSION="v51.1"
          sudo curl -L "https://github.com/cloud-hypervisor/cloud-hypervisor/releases/download/${CH_VERSION}/cloud-hypervisor-static" \
            -o /usr/local/bin/cloud-hypervisor
          sudo chmod +x /usr/local/bin/cloud-hypervisor
          cloud-hypervisor --version

      - name: Download Alpine test assets
        if: env.KVM_AVAILABLE == 'true'
        run: |
          ALPINE_VERSION="3.23"
          ARCH="x86_64"
          BASE_URL="https://dl-cdn.alpinelinux.org/alpine/v${ALPINE_VERSION}/releases/${ARCH}/netboot"

          mkdir -p testdata
          echo "Downloading Alpine ${ALPINE_VERSION} kernel..."
          curl -fsSL "${BASE_URL}/vmlinuz-virt" -o testdata/vmlinuz

          echo "Downloading Alpine ${ALPINE_VERSION} initramfs..."
          curl -fsSL "${BASE_URL}/initramfs-virt" -o testdata/initramfs

          ls -lh testdata/

      - name: VM lifecycle tests
        if: env.KVM_AVAILABLE == 'true'
        env:
          VMRS_TEST_KERNEL: ${{ github.workspace }}/testdata/vmlinuz
          VMRS_TEST_INITRAMFS: ${{ github.workspace }}/testdata/initramfs
        run: cargo test --test vm_lifecycle -- --test-threads=1
        timeout-minutes: 10

  # ── VM lifecycle tests (macOS) ─────────────────────────────────────
  # macOS runners lack the Virtualization.framework entitlement required
  # by Apple VZ. These tests must be run manually on entitled hardware.
  # vm-macos:
  #   name: VM Lifecycle (macOS)
  #   runs-on: macos-latest
  #   if: false  # No VZ entitlement on GitHub runners
